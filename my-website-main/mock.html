<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Search posts</title>
  <script type="module" src="js/mock.js" defer></script>
  <script type="module" src="js/main.js" defer></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>

<body>

   <div class="logoMain">
     <img src="img/LogoS.png" alt="Лого компании">
     <nav class="nav-bar">
       <ul class="nav-links" id="nav">
         <li><a href="index.html">Главная</a></li>
         <li><a href="about.html">О нас</a></li>
         <li><a href="contact.html">Контакты</a></li>
         <li><a href="mock.html">Список постов</a></li>
       </ul>
     </nav>
   </div>

<h1>Поиск постов</h1>

<input type="text" id="searchInput" placeholder="Поиск по названию, содержимому и тегам..." />

<div class="sort-buttons">
  <button id="sortDate">Сортировать по дате</button>
  <button id="sortViews">Сортировать по просмотрам</button>
  <button id="themeLight">Тема: светлая</button>
  <button id="themeDark">Тема: тёмная</button>
</div>

<div id="categories">
  <button data-cat="all">Все</button>
  <button data-cat="новости">Новости</button>
  <button data-cat="обзор">Обзор</button>
  <button data-cat="новая одежда">Новая одежда</button>
  <button data-cat="просто так">Просто так</button>
</div>

<ul id="postsContainer" class="posts"></ul>
<div id="noResults" class="no-results" style="display: none;">По вашему запросу ничего не найдено</div>



<form id="addPostForm" style="display:none;" aria-hidden="true">
   <input type="text" id="postTitle" placeholder="Заголовок" required>
   <input type="text" id="postTags" placeholder="Теги через запятую">
   <textarea id="postContent" placeholder="Содержимое"></textarea>
   <button type="submit">Добавить</button>
   <button type="button" id="cancelAddPost">Отмена</button>
</form>


<div id="formatPanel" class="format-panel" style="display:none; position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid #ccc; padding:12px; box-shadow:0 -2px 8px rgba(0,0,0,0.1); z-index:1000;">
  <div style="display:flex; gap:12px; align-items:flex-start;">
    <div style="flex:1;">
      <label><strong>До</strong></label>
      <pre id="panelBefore" style="white-space:pre-wrap; background:#000000; padding:8px; height:100px; overflow:auto;"></pre>
    </div>
    <div style="flex:1;">
      <label><strong>После</strong></label>
      <pre id="panelAfter" style="white-space:pre-wrap; background:#000000; padding:8px; height:100px; overflow:auto;"></pre>
    </div>
    <div style="flex:1;">
      <label><strong>Редактировать текст</strong></label>
      <textarea id="panelEdit" style="width:100%; height:100px; padding:8px;"></textarea>
      <div style="margin-top:8px; display:flex; gap:8px;">
        <button id="panelSave">Сохранить</button>
        <button id="panelClose">Закрыть</button>
      </div>
    </div>
  </div>
</div>

 <button id="demo-btn">Демо наследования</button>
    <div id="output"></div>

</body>
</html>
