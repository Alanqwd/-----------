<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Search posts</title>
  <script type="module" src="js/mock.js" defer></script>
  <script type="module" src="js/main.js" defer></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>

<body>
 <div class="logoMain">
     <img src="img/LogoS.png" alt="Лого компании">
     <nav class="nav-bar">
       <ul class="nav-links" id="nav">
         <li><a href="index.html">Главная</a></li>
         <li><a href="about.html">О нас</a></li>
         <li><a href="contact.html">Контакты</a></li>
         <li><a href="mock.html">Список постов</a></li>
          <li style="margin-left: auto;"><button id="logoutBtn" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Выйти</button></li>
       </ul>
     </nav>
   </div>

<h1>Поиск постов</h1>

<input type="text" id="searchInput" placeholder="Поиск по названию, содержимому и тегам..." style="width: 100%; padding: 8px; margin-bottom: 10px;" />

<div class="sort-buttons">
  <button id="sortDate">Сортировать по дате</button>
  <button id="sortViews">Сортировать по просмотрам</button>
  <button id="themeLight">Тема: светлая</button>
  <button id="themeDark">Тема: тёмная</button>
</div>


<div class="controls-row">
    <label style="cursor: pointer; user-select: none; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="manualLoadToggle"> 
        <span>Загрузить ещё (иначе авто-загрузка)</span>
    </label>
    <span id="postsCountInfo" style="margin-left: auto; font-weight: bold; color: #555;"></span>
</div>

<div id="categories">
  <button data-cat="all">Все</button>
  <button data-cat="новости">Новости</button>
  <button data-cat="обзор">Обзор</button>
  <button data-cat="новая одежда">Новая одежда</button>
  <button data-cat="просто так">Просто так</button>
</div>


<div id="virtual-scroller"></div>

<div id="noResults" class="no-results" style="display: none; padding: 20px; text-align: center;">По вашему запросу ничего не найдено</div>


<div class="load-more-container">
    <div id="loader" class="loader"></div>
    <button id="loadMoreBtn" class="btn-load" style="display:none;">Загрузить еще 5 постов</button>
    <div id="endMessage" style="display:none; color: gray; margin-top: 10px;">Больше постов нет</div>
</div>


<form id="addPostForm" style="display:none;" aria-hidden="true">
   <input type="text" id="postTitle" placeholder="Заголовок" required>
   <input type="text" id="postTags" placeholder="Теги через запятую">
   <textarea id="postContent" placeholder="Содержимое"></textarea>
   <button type="submit">Добавить</button>
   <button type="button" id="cancelAddPost">Отмена</button>
</form>


<form id="addPostForm" style="display:none;" aria-hidden="true">
   <input type="text" id="postTitle" placeholder="Заголовок" required>
   <input type="text" id="postTags" placeholder="Теги через запятую">
   <textarea id="postContent" placeholder="Содержимое"></textarea>
   <button type="submit">Добавить</button>
   <button type="button" id="cancelAddPost">Отмена</button>
</form>


</body>
</html>
