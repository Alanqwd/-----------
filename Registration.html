<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="css/style.css"/>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f4f4f4; }
        .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; max-width: 90%; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; font-size: 0.9em; display: none; margin-top: 5px; }
        

        .dynamic-field-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .dynamic-field-row input { flex: 1; }
        .btn-remove { background: #dc3545; color: white; border: none; border-radius: 4px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.9em; margin-top: 5px; }
        
        button[type="submit"] { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; margin-top: 10px; }
        button[type="submit"]:hover { background: #0056b3; }
        h2 { text-align: center; margin-top: 0; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Регистрация</h2>
    
    <div class="theme-toggle">
        <button type="button" id="themeLight" class="active">Светлая</button>
        <button type="button" id="themeDark">Тёмная</button>
    </div>
    
    <form id="registerForm">
        <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" required>
            <div id="usernameError" class="error">Это имя уже занято</div>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" required minlength="6">
            <div id="passwordLengthError" class="error">Минимум 6 символов</div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Подтвердите пароль</label>
            <input type="password" id="confirmPassword" required>
            <div id="passwordError" class="error">Пароли не совпадают</div>
        </div>

        <hr>

        <div class="form-group">
            <label>Дополнительные навыки (динамические поля)</label>
            <div id="dynamicFieldsContainer"></div>
            <button type="button" class="btn-add" id="addFieldBtn">+ Добавить навык</button>
        </div>

        <button type="submit">Зарегистрироваться</button>
    </form>
</div>

<script>
    const form = document.getElementById('registerForm');
    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const passwordError = document.getElementById('passwordError');
    const passwordLengthError = document.getElementById('passwordLengthError');
    const usernameError = document.getElementById('usernameError');
    const dynamicContainer = document.getElementById('dynamicFieldsContainer');
    const addFieldBtn = document.getElementById('addFieldBtn');
    const themeLight = document.getElementById('themeLight');
    const themeDark = document.getElementById('themeDark');

    function createDynamicField(value = '') {
        const div = document.createElement('div');
        div.className = 'dynamic-field-row';
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Например: JavaScript, Дизайн...';
        input.value = value;
        input.name = 'skills[]';
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'btn-remove';
        removeBtn.innerHTML = '&times;';
        removeBtn.title = 'Удалить поле';
        removeBtn.addEventListener('click', () => {
            div.remove();
            saveDynamicFields();
        });
        input.addEventListener('input', saveDynamicFields);
        div.appendChild(input);
        div.appendChild(removeBtn);
        return div;
    }

    addFieldBtn.addEventListener('click', () => {
        const field = createDynamicField();
        dynamicContainer.appendChild(field);
        saveDynamicFields();
    });

    function saveDynamicFields() {
        const inputs = dynamicContainer.querySelectorAll('input');
        const values = Array.from(inputs).map(inp => inp.value).filter(v => v.trim() !== '');
        localStorage.setItem('regDynamicFields', JSON.stringify(values));
    }

    function loadDynamicFields() {
        const saved = JSON.parse(localStorage.getItem('regDynamicFields'));
        if (saved && saved.length > 0) {
            saved.forEach(val => {
                dynamicContainer.appendChild(createDynamicField(val));
            });
        } else {
            dynamicContainer.appendChild(createDynamicField());
        }
    }

    function setTheme(theme) {
        document.body.style.background = theme === 'dark' ? '#1a1a2e' : '#f4f4f4';
        document.querySelector('.auth-container').style.background = theme === 'dark' ? '#16213e' : 'white';
        document.querySelector('.auth-container').style.color = theme === 'dark' ? '#fff' : '#000';
        localStorage.setItem('theme', theme);
        themeLight.classList.toggle('active', theme === 'light');
        themeDark.classList.toggle('active', theme === 'dark');
    }

    themeLight.addEventListener('click', () => setTheme('light'));
    themeDark.addEventListener('click', () => setTheme('dark'));

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    function setCookie(name, value, days) {
        const expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Strict`;
    }

    function deleteCookie(name) {
        document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Strict`;
    }

    window.addEventListener('load', () => {
        const savedTheme = getCookie('theme') || localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
        
        const savedData = JSON.parse(localStorage.getItem('regFormData'));
        if (savedData) {
            username.value = savedData.username || '';
            email.value = savedData.email || '';
            password.value = savedData.password || '';
            confirmPassword.value = savedData.confirmPassword || '';
        }
        loadDynamicFields();
        
        if (localStorage.getItem('isRegistered') === 'true') {
            window.location.href = 'http://127.0.0.1:5500/my-website-main/mock.html';
        }
    });

    ['username', 'email', 'password', 'confirmPassword'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            const data = {
                username: username.value,
                email: email.value,
                password: password.value,
                confirmPassword: confirmPassword.value
            };
            localStorage.setItem('regFormData', JSON.stringify(data));
        });
    });

    username.addEventListener('blur', () => {
        const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
        const isTaken = registeredUsers.some(u => u.username === username.value.trim());
        usernameError.style.display = isTaken && username.value.trim() !== '' ? 'block' : 'none';
    });

    password.addEventListener('input', () => {
        passwordLengthError.style.display = password.value.length > 0 && password.value.length < 6 ? 'block' : 'none';
    });

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        let valid = true;
        
        if (password.value.length < 6) {
            passwordLengthError.style.display = 'block';
            valid = false;
        } else {
            passwordLengthError.style.display = 'none';
        }
        
        if (password.value !== confirmPassword.value) {
            passwordError.style.display = 'block';
            valid = false;
        } else {
            passwordError.style.display = 'none';
        }
        
        const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
        const isTaken = registeredUsers.some(u => u.username === username.value.trim());
        if (isTaken && username.value.trim() !== '') {
            usernameError.style.display = 'block';
            valid = false;
        } else {
            usernameError.style.display = 'none';
        }
        
        if (!valid) return;

        const skills = Array.from(dynamicContainer.querySelectorAll('input'))
                            .map(inp => inp.value)
                            .filter(v => v.trim() !== '');

        const newUser = {
            username: username.value.trim(),
            email: email.value.trim(),
            password: password.value,
            skills: skills,
            registeredAt: new Date().toISOString()
        };
        
        registeredUsers.push(newUser);
        localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));
        
        const token = btoa(`${newUser.username}:${Date.now()}:${Math.random().toString(36).substr(2)}`);
        setCookie('authToken', token, 1);
        localStorage.setItem('currentUser', JSON.stringify({ username: newUser.username, email: newUser.email }));
        
        localStorage.setItem('isRegistered', 'true');
        localStorage.removeItem('regFormData');
        localStorage.removeItem('regDynamicFields');
        window.location.href = 'http://127.0.0.1:5500/my-website-main/mock.html';
    });
</script>

</body>
</html>
